<script>
    //面包屑

    layui.use(['form', 'table', 'jquery'], function () {
        var form = layui.form;
        var table = layui.table;
        var $ = layui.jquery;
        var layIdx1;
        initCateList();
        form.render();

        /* 初始化表格 */
        initTable();
        function initTable(params = {}) {
            var where = {
                token: token
            };
            Object.assign(where, params);

            table.render({
                height: 580,
                elem: '#table',
                url: common.proList, //数据接口
                method: 'post',
                request: {
                    pageName: 'current_page', //页码的参数名称，默认：page
                    limitName: 'per_page_num' //每页数据量的参数名，默认：limit
                },
                where: where,
                page: true, //开启分页
                // toolbar: "#toolbarTop",
                defaultToolbar: [],
                limits: [10, 20, 50, 100, 200, 300, 500, 1000],
                cols: [
                    [
                        //表头
                        { type: "checkbox", width: 42 },
                        { field: 'en_sku', width: 180, title: 'SKU' },
                        { field: 'cn_name', width: 330, title: "<div language='ProductChinesename'></div>" },
                        { field: 'en_brand', title: "<div language='Englishbrand'></div>" },
                        { field: 'weight', title: "<div language='WeightKG'></div>" },

                        {
                            field: 'lwh', width: 210, title: "长 * 宽 * 高 (CM)", align: 'center',
                            templet: function (d) {
                                return d.length + '*' + d.width + '*' + d.height;
                            }
                        },

                        { field: 'original_places', title: "<div language='placeoforigin'></div>" },
                        { field: 'cat_name', title: "<div language='productcategory'></div>" },
                        { field: 'number', title: "<div language='TotalQuantity'></div>" },
                        //{ field: 'img_url', title: "<div language='proPic'></div>" },
                        {
                            field: 'img_url',
                            title: "<div language='proPic'></div>",
                            align: 'center',
                            templet: function (d) {
                                if (d.img_url == '') {
                                    return '无图片';
                                } else {
                                    return '<a href="' + d.img_url + '" target="_blank"><img src="' + d.img_url + '" width="60px" height="60px"></a>';
                                }
                            }
                        },
                        /*{ field: 'img_url', title: "<div language='proPic'></div>",templet: function(d) {
                            if (d.img_url == ''){
                              return '无图片';
                            }else{
                              return '<a href="' + d.img_url + '" target="_blank">查看</a>';
                            }
                          }},*/
                        {
                            // field: "status",
                            //align: 'center',
                            title: "<div language='state'></div>",
                            templet: function (d) {
                                return `<input type="checkbox" lay-filter="changeStatus" ${d.status == '正常' ? 'checked' : ''
                                    } value="${d.id}" lay-skin="switch" lay-text="on|off">`;
                            }
                        },
                        {
                            title: "<div language='operate'></div>",
                            width: 100,
                            align: "center", toolbar: '#test-dropdown-toolbar-barDemo'
                        }
                    ]
                ],
                parseData: function (res) {
                    console.log(res);
                    return {
                        code: 0, //解析接口状态
                        msg: res.msg, //解析提示文本
                        count: res.data ? res.data.count : 0, //解析数据长度
                        data: res.data ? res.data.data : [] //解析数据列表
                    };
                },
                done: function () {
                    form.on('switch(changeStatus)', function (data) {
                        var url = data.elem.checked ? common.ablePro : common.disablePro;
                        requestPost(url, { id: data.value }, function (res) {
                            console.log(res);
                        });
                    });

                    setTimeout(() => {
                        setLanguage();
                    }, 100)
                }
            });
        }

        /* 检索条件 */
        form.on('submit(submitBtn)', function (obj) {
            initTable(obj.field);
            //搜索时，增加语言包
            setLanguage();
            return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
        });

        /* 工具条操作 */
        table.on('tool(table)', function (obj) {
            //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
            var that = this;
            var data = obj.data; //获得当前行数据
            var layEvent = obj.event; //获得 lay-event 对应的值（也可以是表头的 event 参数对应的值）
            var tr = obj.tr; //获得当前行 tr 的 DOM 对象（如果有的话）
            //console.log(data);
            if (layEvent === "more") {
                var menuList = [{
                    title: "<div language='edit'></div>"
                    , type: 'edit'
                    , id: data.id
                }, {
                    title: "<div language='check'></div>"
                    , type: 'detail'
                    , id: data.id
                }, {
                    title: "<div language='del'></div>"
                    , type: 'del'
                    , id: data.id
                }, {
                    title: "<div language='print'></div>"
                    , type: 'dayin'
                    , id: data.id
                }];
                setLanguage();
            }
            //更多下拉菜单
            dropdown.render({
                elem: that
                , show: true //外部事件触发即显示
                , data: menuList
                , click: function (odata, othis) {
                    //根据 id 做出不同操作
                    if (odata.type === 'del') {
                        layer.confirm('删除后不可恢复', {
                            title: ['<img src="/images/new/jinggao.png">&nbsp;确认要删除吗？', 'font-size:16px;background:#212529'],
                            shadeClose: true,
                            area: ['424px', '170px'], //弹框的大小
                            btn: ['确认', '取消'] //按钮
                        }, function (index) {
                            requestPost(common.delPro, { id: odata.id }, function (res) {
                                if (res.code == 1) {
                                    window.location.reload();
                                    initTable();
                                }
                            });
                        }
                        )
                    }
                    if (odata.type === "detail") {
                        window.location.href = '#/page/generation/product-create.html?type=detail&id=' + odata.id;
                        return false;
                    }
                    if (odata.type === "edit") {
                        window.location.href = '#/page/generation/product-create.html?type=edit&id=' + odata.id;
                        return false;
                    }
                    if (odata.type === "dayin") {
                        requestPost(common.proDayin, { id: data.id }, function (res) {
                            if (res.code == 1) {
                                window.open(res.data.pdf_url, 'top');
                            }
                        });
                    }
                }
            });
            setLanguage();
        });
        //批量打印
        $('#print').click(function () {
            var checkStatus = table.checkStatus('table');
            var data = checkStatus.data;
            /*
            if (data.length > 100) {
              layer.alert('勾选批量打印，条数不能超过100。', {
                title:["<img src='/images/new/jinggao.png'>&nbsp;温馨提示", 'font-size:16px;background:#212529'],
                skin: 'layer-ext-demo'
              })
              return false;
            }
            */
            var str = "";
            data.forEach(function (item, idx) {
                str += item.id + ",";
            });
            var two = layer.load(1);
            requestPost(common.proBatchDayin, { str: str }, function (res) {
                if (res.code == 1) {
                    var str = "本次打印" + res.data.num + "条，数据根据筛选条件导出";
                    layer.confirm(str, { btn: ['确定', '取消'], title: "确定打印" }, function () {
                        layer.close(two);
                        window.open(res.data.pdf_url, 'top');
                    });
                    layer.close(two);
                } else {
                    layer.close(two);
                    layer.alert(res.msg, {
                        icon: 2,
                        skin: 'layer-ext-demo'
                    })
                }
                layer.close(two);
            });
        });
        /* 表头操作 */
        var tablebarActive = {
            /* 启用 */
            start: function () {
                var checkStatus = table.checkStatus('table');
                var data = checkStatus.data;
                console.log(data);
            },
            /* 停用 */
            stop: function () {
                var checkStatus = table.checkStatus('table');
                var data = checkStatus.data;
                console.log(data);
            },
            /* 删除 */
            moreDel: function () {
                var checkStatus = table.checkStatus('table');
                var data = checkStatus.data;
                console.log(data);
            },
            /* 打印 */
            print: function () {
                var checkStatus = table.checkStatus('table');
                var data = checkStatus.data;
                console.log(data);
            },
            /* 导出 */
            report: function () {
                var checkStatus = table.checkStatus('table');
                var data = checkStatus.data;
                console.log(data);
            }
        };
        $('.layui-table-tool-temp .layui-btn').on('click', function () {
            var type = $(this).data('type');
            tablebarActive[type] ? tablebarActive[type].call(this) : '';
        });
    });
</script>
