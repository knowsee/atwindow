<script>
  //面包屑
  /*$('.s_one').html('一件代发&nbsp;/&nbsp;');
  $('.s_two').html('入库管理');*/
  layui.use(["laydate", "table"], function() {
    var laydate = layui.laydate;
    var table = layui.table;
    var layIdx1;

    form.render();
    //日期范围选择
    laydate.render({
      elem: "#time",
      range: "至" //或 range: '~' 来自定义分割字符
    });

    var searchConfig = {
      status: 1,
      asn: "",
      tracking_no: "",
      starttime: "",
      endtime: "",
      sku: ""
    };
    initTable();
    /* 初始化表格 */
    function initTable() {
      var where = {
        token: token
      };
      Object.assign(where, searchConfig);
      table.render({
        height: 550,
        elem: "#table",
        url: common.rukuList, //数据接口
        method: "post",
        request: {
          pageName: "current_page", //页码的参数名称，默认：page
          limitName: "per_page_num" //每页数据量的参数名，默认：limit
        },
        where: where,
        page: true, //开启分页
		limits: [10,20,50,100,200,300,500,1000],
        /*toolbar: "#toolbarTop",*/
        cols: [
          [
            //表头
            { type: "checkbox",width: 42 },
            { field: "id", title: "ID",width: 80},
            { field: "warehouse_name", title: "<div language='Warehousing'></div>",width: 150},
            { field: "box_type", title: "<div language='type'></div>",width: 80},
            { field: "tracking_no", title: "<div language='cankaohao'></div>",width: 180},
            /*{ field: "kuaidi_number", title: "<div language='kuaidi_number'></div>",width: 145},*/
            { field: "cn_name", title: "<div language='ProductChinesename'></div>",width: 130 },
            { field: "sku", title: "sku" ,width: 150},
            { field: "sku_num", title: "<div language='numberskuForecast'></div>" ,width: 100},
            { field: "real_sku_num", title: "<div language='Numberskulisted'></div>",width: 100},
            { field: "weight", title: "<div language='weight'></div>" ,width: 100},
            //{ field: "status", title: "状态" },
            { field: "statusStr", title: "<div language='state'></div>" ,width: 90},
            { field: "createtime", title: "<div language='createTime'></div>" ,width: 130},
            { field: "receivetime", title: "<div language='warehousingtime'></div>" ,width: 130},
            {
              fixed: '',
              title: "<div language='operate'></div>",
              width: 130,
              align: "center", toolbar: '#test-dropdown-toolbar-barDemo'
            }
          ]
        ],
        parseData: function(res) {

          return {
            code: 0, //解析接口状态
            msg: res.msg, //解析提示文本
            count: res.data ? res.data.count : 0, //解析数据长度
            data: res.data ? res.data.data : [] //解析数据列表
          };
        },done: function(){
          setTimeout(()=>{
            setLanguage();
          }, 100)
        }
      });
    }

    /* 检索条件 */
    form.on("submit(submitBtn)", function(obj) {
      field = obj.field;
      field.starttime = field.time.split(" 至 ")[0];
      field.endtime = field.time.split(" 至 ")[1];
      delete field["time"];
      Object.assign(searchConfig, field);
      initTable();
      //搜索时，增加语言包
      setLanguage();
      return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
    });

    $(".layui-tab-title a").click(function() {
      var title = $(this).attr("data-title");
      var hasCheckBox = false;
      searchConfig.status = title;
      // if (title == "认领区") {
      //   hasCheckBox = true;
      // }
      initTable();
    });
    table.on("tool(table)", function(obj) {
      //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
      var data = obj.data; //获得当前行数据
      var layEvent = obj.event; //获得 lay-event 对应的值（也可以是表头的 event 参数对应的值）
      var tr = obj.tr; //获得当前行 tr 的 DOM 对象（如果有的话）
      var that = this;
      if (layEvent === "more") {
        if (data.status == 3){
          var menuList = [{
            title: "<div language='edit'></div>"
            ,type: 'edit'
            ,id: data.id
          }];
        }else if (data.status == 1){
          var menuList = [{
            title: "<div language='edit'></div>"
            ,type: 'edit'
            ,id: data.id
          }, {
            title: "<div language='del'></div>"
            ,type: 'del'
            ,id: data.id
          }, {
            title: "<div language='check'></div>"
            ,type: 'detail'
            ,id: data.id
          }, {
            title: "<div language='shippingmark'></div>"
            ,type: 'dayin'
            ,id: data.id
          }];
        }else if (data.status == 2){
          var menuList = [{
            title: "<div language='shippingmark'></div>"
            ,type: 'dayin'
            ,id: data.id
          }];
        }else{
          var menuList = [];
        }

        //更多下拉菜单
        dropdown.render({
          elem: that
          ,show: true //外部事件触发即显示
          ,data: menuList
          ,click: function(odata, othis){
            //根据 id 做出不同操作
            if(odata.type === 'del'){
              layer.confirm('删除后不可恢复', {
                        title:['<img src="/images/new/jinggao.png">&nbsp;确认要删除吗？', 'font-size:16px;background:#212529'],
                        shadeClose:true,
                        area:['424px','170px'], //弹框的大小
                        btn:['确认','取消'] //按钮
                      }, function(index){
                        requestPost(common.delReturn, { id: odata.id }, function(res) {
                          if (res.code == 1) {
                            window.location.reload();
                            initTable();
                          }
                        });
                      }
              )
            }
            if (odata.type === "detail") {
              window.location.href = '#/page/generation/warehouse-create.html?type=detail&id='+odata.id;
              return false;
            }
            if (odata.type === "edit") {
              window.location.href = '#/page/generation/warehouse-create.html?type=edit&id='+odata.id;
              return false;
            }
            if (odata.type === "dayin") {
              window.open('https://backend.atwindow.com/'+data.pdf_url,'top');
              //window.open('http://back.com/'+data.pdf_url,'top');
              return false;
            }
          }
        });
      }
      setLanguage();
    });
    //批量打印
    $('#print').click(function() {
      var checkStatus = table.checkStatus('table');
      var data = checkStatus.data;
	  /*
      if (data.length > 100) {
        layer.alert('勾选批量打印，条数不能超过100', {
          title:["<img src='/images/new/jinggao.png'>&nbsp;温馨提示", 'font-size:16px;background:#212529'],
          skin: 'layer-ext-demo'
        })
        return false;
      }
	  */
      var str = "";
      data.forEach(function(item, idx) {
        str += item.id + ",";
      });

      var create_time = $('#time').val();
      if (str == "" && create_time == "") {
        layer.alert('请勾选数据或选择创建日期，操作批量打印箱唛！！！', {
          title:["<img src='/images/new/jinggao.png'>&nbsp;温馨提示", 'font-size:16px;background:#212529'],
          skin: 'layer-ext-demo'
        })
        return false;
      }
      var two = layer.load(1);
      requestPost(common.dayinPl, {str:str,create_time:create_time}, function(res) {
        if (res.code == 1) {
          var str = "本次打印"+res.data.num+"条";
          layer.confirm(str, {btn: ['确定', '取消'], title: "确定打印"}, function () {
            layer.close(two);
            window.open(res.data.pdf_url,'top');
          });
          layer.close(two);
        }else{
          layer.close(two);
          layer.alert(res.msg, {
            icon: 2,
            skin: 'layer-ext-demo'
          })
        }
        layer.close(two);
      });
    });
    //批量删除
    $('#delBatch').click(function() {
      var checkStatus = table.checkStatus('table');
      var data = checkStatus.data;
      if (data.length > 100) {
        layer.alert('勾选批量删除，条数不能超过100', {
          title:["<img src='/images/new/jinggao.png'>&nbsp;温馨提示", 'font-size:16px;background:#212529'],
          skin: 'layer-ext-demo'
        })
        return false;
      }
      var str = "";
      data.forEach(function(item, idx) {
        str += item.id + ",";
      });
      if (str == "") {
        layer.alert('请勾选数据，操作批量删除！！！', {
          title:["<img src='/images/new/jinggao.png'>&nbsp;温馨提示", 'font-size:16px;background:#212529'],
          skin: 'layer-ext-demo'
        })
        return false;
      }
      layer.confirm('删除后不可恢复', {
                title:['<img src="/images/new/jinggao.png">&nbsp;确认要批量删除吗？', 'font-size:16px;background:#212529'],
                shadeClose:true,
                area:['424px','170px'], //弹框的大小
                btn:['确认','取消'] //按钮
              }, function(index){
                  requestPost(common.delBatch, {str:str}, function(res) {
                    if (res.code == 1) {
                      window.location.reload();
                      initTable();
                    }else{
                      layer.alert(res.msg, {
                        icon: 2,
                        skin: 'layer-ext-demo'
                      })
                    }
                  });
              }
      )
    });
  });
</script>
