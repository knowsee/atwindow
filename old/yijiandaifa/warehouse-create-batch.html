<script>
  //面包屑
  /*$('.s_one').html('一件代发&nbsp;/&nbsp;订单列表&nbsp;/&nbsp;');
  $('.s_two').html('批量新建');*/
  function a(){
    var myFile = document.getElementById("excel").files[0];
    $("#show").css('display', 'flex');
    var fileName = myFile.name;
    $("#show1").text(fileName);
  }
  var upload;
  layui.use(['upload', 'table'], function() {
    upload = layui.upload;
    var table = layui.table;
    var layIdx1;
    var layIdx2;

    initWarehouseList(3);
    form.render();

    form.on('select(p_transport_type)', function(formData){
      if (formData.value == 60 || formData.value == 61){
        $('.qm').show();
      }else{
        $('.qm').hide();
      }
    });

    //批量
    form.on('submit(p_submitBtn)', function(obj){
      var p_transport_type = $("#p_transport_type option:selected").val();
      var warehouse_id = $("#warehouse_id option:selected").val();
      var signature_type = $("#signature_type option:selected").val();
      if (p_transport_type == 0) {
        layer.msg("请选择发货线路",{icon:2});
        return false;
      }
      if (warehouse_id == 0 || warehouse_id == '') {
        layer.msg("请选择发货仓库",{icon:2});
        return false;
      }
      var formData = new FormData();
      formData.append("file", document.getElementById("excel").files[0]);
      formData.append("token", token);
      var two = layer.load(1);
      $.ajax({
        url: common.batchaddRuku,
        type: "POST",
        data: formData,
        contentType: false,
        processData: false,
        success: function (res) {
          if (res.code == 1) {
            layer.close(two);
            if (res.data.pdf != ''){
              window.open(res.data.pdf);
            }else{
              layer.msg(res.msg, {icon:1});
            }
            setTimeout(function(){
              window.location.href = "#/page/generation/warehouse-list.html"
              //window.location.reload();
            }, 2000);
          }else {
            layer.close(two);
            layer.alert(res.msg, {
              icon: 2,
              skin: 'layer-ext-demo'
            })
          }
        },
        error: function () {

        }
      });
      return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
    });

  });
</script>
