<script>
  var upload;
  layui.use(['upload', 'table'], function() {
    upload = layui.upload;
    var table = layui.table;
    var layIdx1;
    var layIdx2;
    form.render();
    var type = getQueryString('type'); /* 创建 or 查看 or 修改 */

    /* 当前收件人信息 */
    var recAddressCur = {};

            res,
            index,
            upload,
            _this
    ) {
      if (res.code == 1) {
        $(_this)[0].elem.parent().find('input[name=fnsku_file_xb]').val(res.data.file_url);
        $(_this)[0].elem.parent().find('#span').show();
        $(_this)[0].elem.parent().find('#href').attr('href','https://backend.atwindow.com/' + res.data.file_url);
        //$('input[name=fnsku_file_xb]').val(res.data.file_url);
        //$('#span').show();
        //$('#href').attr('href','https://backend.atwindow.com/' + res.data.file_url);
      }
    });
    uploadFile($('.fnsku_btn_xb_1')[0], null, null, function(
            res,
            index,
            upload,
            _this
    ) {
      if (res.code == 1) {
        $(_this)[0].elem.parent().find('input[name=fnsku_file_xb_1]').val(res.data.file_url);
        $(_this)[0].elem.parent().find('#span1').show();
        $(_this)[0].elem.parent().find('#href1').attr('href','https://backend.atwindow.com/' + res.data.file_url);
      }
    });
    function countryRec(cn_name){
      $.ajax({
        type: 'post',
        url: common.queryCountry,
        data: {
          token: token
        },
        success: function(res) {
          if (res.code == 1) {
            var countryList = res.data;
            $('select[name=rec-people-country]').html("<option value=''></option>");
            countryList.forEach(function(item, idx) {
              var name =
                      item.short_name + ' - ' + item.en_name + ' - ' + item.cn_name;
              if (cn_name == item.cn_name){
                $('select[name=rec-people-country]').append(
                        "<option value='" + item.cn_name + "' selected>" + name + '</option>'
                );
              }else{
                $('select[name=rec-people-country]').append(
                        "<option value='" + item.cn_name + "'>" + name + '</option>'
                );
              }

            });

            form.render();
          } else {
            layer.msg(res.msg);
          }
        },
        error: function() {
          layer.msg('请求国家失败');
        }
      });
    }

    function getSku(en_sku) {
      //console.log(en_sku);
      //return false;
      $.ajax({
        type: 'post',
        url: common.skuData,
        data: {
          token: token
        },
        success: function(res) {
          if (res.code == 1) {
            var skuData = res.data;
            //console.log(skuData);
            $('select[name=en_sku]').html("<option value=''>请选择</option>");
            $.each(skuData,function(index,value){
              if (en_sku == value.en_sku){
                $('select[name=en_sku]').append(
                        "<option value='" + value.en_sku + "' selected>" + value.en_sku + '_' + value.cn_name + '</option>'
                );
              }else{
                $('select[name=en_sku]').append(
                        "<option value='" + value.en_sku + "'>" + value.en_sku + '_' + value.cn_name + '</option>'
                );
              }

            });
            form.render();
          } else {
            layer.msg(res.msg);
          }
        },
        error: function() {
          layer.msg('请求sku失败');
        }
      });
    }

    var expressList = '';
    initExpressList(function(html) {
      expressList = html;
      checkType();
    });

    /* 初始化收件人表格 */
    function reloadRecPeople(params = {}) {
      var where = {
        type: 2,
        token: token
      };
      Object.assign(where, params);
      table.render({
        elem: '#recAddressTable',
        id: 'recAddressTable',
        url: common.queryAddr, //数据接口
        method: 'post',
        request: {
          pageName: 'current_page', //页码的参数名称，默认：page
          limitName: 'per_page_num' //每页数据量的参数名，默认：limit
        },
        where: where,
        page: true, //开启分页
        cols: [
          [
            //表头
            // { type: 'checkbox' },
            { field: 'name', title: '<div language=\'Name\'></div>' },
            { field: 'address', title: '<div language=\'Address1\'></div>' },
            { field: 'postcode', title: '<div language=\'PostCode\'></div>'},
            {
              title: '<div language=\'operate\'></div>',
              width: 180,
              align: 'center',
              templet: function(d) {
                return `<a href="javascript:;" class="xuanze" lay-event="add"><div language="choice"></div></a>`
              }
            }
          ]
        ],
        parseData: function(res) {
          return {
            code: 0, //解析接口状态
            msg: res.msg, //解析提示文本
            count: res.data ? res.data.count : 0, //解析数据长度
            data: res.data ? res.data.data : [] //解析数据列表
          };
        },done: function(){
          setLanguage();
        }
      });
    }

    table.on('tool(recAddressTable)', function(obj) {
      //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
      var data = obj.data; //获得当前行数据
      var layEvent = obj.event; //获得 lay-event 对应的值（也可以是表头的 event 参数对应的值）
      var tr = obj.tr; //获得当前行 tr 的 DOM 对象（如果有的话）
      if (layEvent === 'add') {
        recAddressCur = data;

  /* 包裹删除 */
  function removeBox(obj) {
    _this = event.target;
    var len = $(_this)
            .parent()
            .parent()
            .parent()
            .parent()
            .find('.skuArr').length;
    if (len <= 1) {
      return false;
    }
    $(_this)
            .parent()
            .parent()
            .parent()
            .remove();
  }

  /* 数量改变 */
  function changeNum() {
    var sum = 0;
    var list = $('.pro-box input[name=goods_num]');
    for (var i = 0; i < list.length; i++) {
      var item = list[i];
      sum += Number($(item).val());
    }
    $('#all_num').html(sum);
    changePrice();
  }

  /* 价格改变 */
  function changePrice() {
    var sum = 0;
    var list = $('.pro-box .box-item');
    for (var i = 0; i < list.length; i++) {
      var item = list[i];
      var value = $(item)
              .find('input[name=value]')
              .val();
      var num = $(item)
              .find('input[name=goods_num]')
              .val();
      sum += Number(value) * Number(num);
    }
    $('#all_price').html(sum.toFixed(2));
  }


  function checkSku(id)
  {
    var skuno = "#en_sku_"+id;
    var en_sku = $(skuno).val();
    var token = getCookie('token');
    $.ajax({
      url: common.checkPro,
      type: 'post',
      data: {en_sku:en_sku,"token":token},
      success: function(res) {
        if (res.code == 1) {
          var name_no = "#cn_name_"+id;
          $(name_no).val(res.data.cn_name);
        } else {
          layer.msg("该sku没有对应的产品");
          return false;
        }
      },
      error: function() {
        layer.msg('请求接口错误！', { icon: 5 });
      }
    });
  }
