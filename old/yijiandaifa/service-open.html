<script>
  //面包屑
  layui.use([], function() {
    form.render();
    initWarehouseList();
    initCountryList();

    var lang = getCookie('lang');
    if (lang === 'en'){
      var msg1 = 'Your opening application has been submitted, please wait for the background staff to review and open, if you have any questions, please contact customer service or sales manager to check the progress!';
    }else{
      var msg1 = '您的开通申请已提交，请等待后台工作人员审核开通，如有疑问可联系客服或者销售经理查询进度！';
    }
    form.on('submit(submitBtn)', function(obj) {
      var field = obj.field;
      requestPost(common.applyService, field, function(res) {
        if (res.code == 1) {
          layer.msg(msg1, { icon: 1});
          setTimeout(function(){
            window.location = '/#/page/admin/info.html';
          }, 3000);
          // setTimeout(function() {
          //   window.location.reload();
          // }, 2000);
        }
      });
      return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
    });
  });
</script>
<script type="text/javascript">
  var pathnameArr= new Array();
  var pathname = window.location.href;
  pathnameArr = pathname.split("#"); //字符分割
  var x = pathnameArr[1].split("?");
  var xxx = init[x[0]];
  $('.s_one').attr('language',xxx['one']);
  $('.s_two').attr('language',xxx['two']);

  setTimeout(()=>{
    setLanguage();
  }, 100)

  setLang();

  var lang = getCookie('lang');

  if (lang === 'en'){
    $("input[name='sale_type']").attr('placeholder',"Such as eBay, Amazon, independent B2C platforms, etc.");
  }else{
    $("input[name='sale_type']").attr('placeholder','例如eBay、Amazon、独立 B2C平台等');
  }
</script>
