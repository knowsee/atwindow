              <!--<div class="layui-row">
                <div class="layui-col-md6">
                  <div class="layui-form-item">
                    <label class="layui-form-label">产品数量：</label>
                    <div class="layui-input-block">
                      <input
                              type="number"

            <!-- <div class="layui-row">
              <div class="layui-col-md6">

                </div>
                <div class="layui-col-xs11" style="min-height: 110px">
                  <p>下载入库清单批量上传模板并填写信息</p>

<div id="uploadMoreProductModal" style="display: none">
  <div style="padding: 20px">
    <button type="button" class="layui-btn layui-btn-normal" id="uploadPro-btn">
      <i class="layui-icon">&#xe67c;</i>上传文件
    </button>
    <button
            type="button"
            class="layui-btn layui-btn-normal"
            id="uploadFNSKU-btn"
    >
      <i class="layui-icon">&#xe67c;</i>FNSKU上传
    </button>
    <a
            href="/download/批量创建入库清单模板.xlsx"
            class="layui-btn layui-btn-normal"
    >模板下载</a
    >
  </div>

<script>
  layui.use(['laydate', 'table'], function() {
    var laydate = layui.laydate;
    var table = layui.table;
    var laydate = layui.laydate;
    var layIdx1;
    var data_out = []; /* 已选产品 */
    var data_in = []; /* 未选产品 */

    var type = getQueryString("type"); /* 创建 or 查看 or 修改 */
    var id = getQueryString("id");


    laydate.render({
      elem: '#get_time',
      range: '至'
    });

    /* 获取未选产品列表 */
    requestPost(
            common.proList,
            { current_page: 1, per_page_num: 9999999999 },
            function(res) {
              if (res.code == 1){
                  data_in = res.data.data
              }else{
                data_in = [];
              }
              //data_in = res.data.data || [];
            }
    );
    initWarehouseList(1);
    initExpressList();
    form.render();

    /* 初始化表格 */
    /* 已选表格 */
    table.render({
      elem: '#table_out',
      id: 'table_out',
      data: data_out,
      height: 300,
      cols: [
        [
          //表头
          // { type: 'checkbox' },
          { field: 'id', align: 'center', title: 'ID', hide: true },
          /*{
            field: 'cp_img',
            title: '产品图片',
            align: 'center',
            templet: function(d) {
              if (/(http|https):\/\/([\w.]+\/?)\S*!/.test(d.img_url)) {
                return `<img src="${d.img_url}">`;
              } else {
                return `<img src="${imgUrl}${d.img_url}">`;
              }
            }
          },*/
          { field: 'en_sku', align: 'center', title: 'SKU' },
          { field: 'cn_name', align: 'center', title: '产品中文名' },
          { field: 'cat_name', align: 'center', title: '分类' },
          { field: 'weight', align: 'center', title: '重量（KG）' },
          { field: 'kucun_warn', align: 'center', title: '产品数量',templet: function(d) {
              return `<input type="text" name="kucun_warn" id="kucun_warn" required  lay-verify="required" placeholder="请输入产品数量" autocomplete="off" class="layui-input">`;
            }},
          {
            title: '操作',
            width: 150,
            align: 'center',
            templet: function(d) {
              return `<a href="javascript:;" class="layui-btn layui-btn-sm layui-btn-danger" lay-event="del">删除</a>`;
            }
          }
        ]
      ]
    });
    /* 未选表格 */
    table.render({
      elem: '#table_in',
      id: 'table_in',
      // url: 'api/product.json', //数据接口
      // toolbar: '#toolbarTop',
      // defaultToolbar: [],
      data: data_in,
      page: true, //开启分页
      cols: [
        [
          //表头
          { type: 'checkbox' },
          { field: 'id', align: 'center', title: 'ID', hide: true },
          /*{
            field: 'cp_img',
            title: '产品图片',
            align: 'center',
            templet: function(d) {

              if (/(http|https):\/\/([\w.]+\/?)\S*!/.test(d.img_url)) {
                return `<img src="${d.img_url}">`;
              } else {
                return `<img src="${imgUrl}${d.img_url}">`;
              }

            }
          },*/
          { field: 'en_sku', align: 'center', title: 'SKU' },
          { field: 'cn_name', align: 'center', title: '产品中文名' },
          { field: 'en_name', align: 'center', title: '产品英文名' },
          { field: 'cat_name', align: 'center', title: '分类' },
          { field: 'weight', align: 'center', title: '重量（KG）' },
          {
            title: '操作',
            width: 150,
            align: 'center',
            templet: function(d) {
              return `<a href="javascript:;" class="layui-btn layui-btn-sm layui-btn-danger" lay-event="add">添加</a>`;
            }
          }
        ]
      ],
      done: function(res) {
        data_in = res.data;
      }
    });

    $('#addProduct').click(function() {
      var openWH = layuimini.getOpenWidthHeight();
      layIdx1 = layer.open({
        type: 1,
        title: '添加产品信息',
        content: $('#chooseProModal'),
        area: [openWH[0] + 'px', openWH[1] + 'px'],
        offset: [openWH[2] + 'px', openWH[3] + 'px'],
        success: function(layero) {
          form.render();
          table.reload('table_in', {
            data: data_in
          });
        }
      });
    });
    /* 批量添加产品 */
    $('#moreAddProduct').click(function() {
      var checkStatus = table.checkStatus('table_in');
      var data = checkStatus.data;

      //console.log(data);
      data_out = data_out.concat(data);
      for (let i = 0; i < data.length; i++) {
        var item = data[i];
        removeByValue(data_in, 'id', item.id);
      }
      table.reload('table_in', {
        data: data_in
      });
      table.reload('table_out', {
        data: data_out
      });
      layer.closeAll();
      return false;
    });
    /* 批量添加产品 模板 */
    $('#moreAddProductBtn').click(function() {
      var openWH = layuimini.getOpenWidthHeight();
      layIdx1 = layer.open({
        type: 1,
        title: '批量添加产品',
        content: $('#uploadMoreProductModal').html(),
        area: [openWH[0] + 'px', openWH[1] + 'px'],
        offset: [openWH[2] + 'px', openWH[3] + 'px'],
        success: function(layero, index) {
          upload.render({
            elem: $(layero).find('#uploadPro-btn'), //绑定元素
            url: '/upload/', //上传接口
            exts: 'xls',
            accept: 'file',
            done: function(res, index, upload) {
              //上传完毕回调
            },
            error: function() {
              //请求异常回调
            }
          });
          upload.render({
            elem: $(layero).find('#uploadFNSKU-btn'), //绑定元素
            url: '/upload/', //上传接口
            exts: 'xls',
            accept: 'file',
            done: function(res, index, upload) {
              //上传完毕回调
            },
            error: function() {
              //请求异常回调
            }
          });
        }
      });
    });

    /* 提交按钮 */
    form.on('submit(submitBtn)', function(obj) {
      field = obj.field;

      if (data_out.length < 1) {
        layer.msg('产品列表不能为空', { icon: 5 });
        return false;
      }


      var arr =[];
      $("input[name='kucun_warn']").each(function(){
        arr.push($(this).val());
      });

      //console.log(arr);
      data_out.forEach(function(item, idx) {

        item.kucun_warn = arr[idx];
      });


      //field.pids = '';
      // data_out.forEach(function(item, idx) {
      //   field.pids += item.id + ',';
      // });
      field.product_info = data_out;
      field.yjdcstime = field.time.split(' 至 ')[0];
      field.yjdcetime = field.time.split(' 至 ')[1];
      delete field['time'];

      requestPost(common.addRuku, field, function(res) {
        if (res.code == 1) {
          layer.msg("新入库清单提交成功", {icon:1});
          setTimeout(function(){
            window.location.reload();
          }, 3000)
        }
      });
      return false; //阻止表单跳转。如果需要表单跳转，去掉这段即可。
    });

    /* 工具条操作 */
    table.on('tool(table_in)', function(obj) {
      //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
      var data = obj.data; //获得当前行数据
      var layEvent = obj.event; //获得 lay-event 对应的值（也可以是表头的 event 参数对应的值）
      var tr = obj.tr; //获得当前行 tr 的 DOM 对象（如果有的话）
      if (layEvent === 'add') {
        /* 行编辑 */
        data_out.push(data);
        removeByValue(data_in, 'id', data.id);
        table.reload('table_out', {
          data: data_out
        });
        table.reload('table_in', {
          data: data_in
        });

        layer.closeAll();
        //$("#sel-product").css("display","none");
      }
    });

    /* 工具条操作 */
    table.on('tool(table_out)', function(obj) {
      //注：tool 是工具条事件名，test 是 table 原始容器的属性 lay-filter="对应的值"
      var data = obj.data; //获得当前行数据
      var layEvent = obj.event; //获得 lay-event 对应的值（也可以是表头的 event 参数对应的值）
      var tr = obj.tr; //获得当前行 tr 的 DOM 对象（如果有的话）
      if (layEvent === 'del') {
        /* 行编辑 */
        data_in.push(data);
        removeByValue(data_out, 'id', data.id);
        table.reload('table_out', {
          data: data_out
        });
        table.reload('table_in', {
          data: data_in
        });
      }
    });

    /* 模板文件上传 */
    uploadFile('#upload-btn', common.batchaddRuku, 'xls|xlsx');

    checkType();

    /* 判断 编辑 查看 添加 */
    function checkType() {
      if (type == "detail" || type == "edit") {

        $('.layui-table-view .layui-table').css('width', '99.99%');
        $('.layui-none').css('display','none');

        $('#id').val(id);
        $('#type').val(type);

        requestPost(common.rukuDetail, { id: id }, function(res) {
          if (res.code == 1) {

            if (type == "detail"){
              $("#sel-product").css("display","none");
            }
            var data = res.data.package;
            form.val("form", data);
            var product = res.data.product;
            // console.log(product);

            var express = 'dd[lay-value=' + res.data.express_id + ']';
            $("select[name='express_id']").siblings("div.layui-form-select").find('dl').find(express).click();

            var cangchu = 'dd[lay-value=' + res.data.warehouse_id + ']';
            $("select[name='warehouse_id']").siblings("div.layui-form-select").find('dl').find(cangchu).click();

            $("#get_time").val(data.yjdc_time);



            var product_html = '';
            $.each(product, function(k, val){


              product_html += '<tr data-index="0" class="">' +
                      '<td data-field="id" data-key="1-0-0" align="center" class="layui-hide">' +
                      '<div class="layui-table-cell laytable-cell-1-0-0"></div>' +
                      '</td>' +

                      /*'<td data-field="cp_img" data-key="1-0-1" align="center" data-content="" class="">' +
                      '<div class="layui-table-cell laytable-cell-1-0-1">' +
                      '<img src="'+val.img_url+'">' +
                      '</div>' +
                      '</td>' +*/

                      '<td data-field="en_sku" data-key="1-0-1" align="center" class="">' +
                      '<div class="layui-table-cell laytable-cell-1-0-1">'+val.en_sku+'</div' +
                      '></td>' +

                      '<td data-field="cn_name" data-key="1-0-2" align="center" class="">' +
                      '<div class="layui-table-cell laytable-cell-1-0-2">'+val.cn_name+'</div>' +
                      '</td>' +

                      '<td data-field="cat_name" data-key="1-0-3" align="center" class="">' +
                      '<div class="layui-table-cell laytable-cell-1-0-3">'+val.cat_name+'</div>' +
                      '</td>' +

                      '<td data-field="weight" data-key="1-0-4" align="center" class="">' +
                      '<div class="layui-table-cell laytable-cell-1-0-4">'+val.weight+'</div>' +
                      '</td>' +
                      '<td data-field="weight" data-key="1-0-5" align="center" class="">' +
                      '<div class="layui-table-cell laytable-cell-1-0-5">'+val.sku_num+'</div>' +
                      '</td>' +


                      // '<td data-field="7" data-key="7-0-7" align="center" data-content="" class="layui-table-col-special">' +
                      // '<div class="layui-table-cell laytable-cell-7-0-7">' +
                      // '<a href="javascript:;" class="layui-btn layui-btn-sm layui-btn-danger disabled" lay-event="del">删除</a>' +
                      // '</div' +
                      // '></td>' +
                      '</tr>';
              $("table tbody").html(product_html);
              $("table thead tr th").eq(6).css("display","none");
            });


          }

          if (type == "detail") {
            $("button").hide();

            $("input,select").attr("disabled", true);

          }
          $(".layui-tab-title").hide();

          form.render();
        });
      }
    }
  });
</script>
