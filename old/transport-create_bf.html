                    <label class="layui-form-label" style="width: 10%">
                      <select name="is_hb" value="${item.is_hb}">
                          <option value="1">是</option>
                          <option value="2">否</option>
                        </select>
                    </label>

                    <label class="layui-form-label juxing"><span language="shangchuan"></span></label>
                    <label class="layui-form-label" style="width: 7%;">
                      <button type="button" class="layui-input fnsku_btn"  style="border-radius: 0px 8px 8px 0px!important;cursor: pointer;">
                        <span style="margin-left: -40px!important;color: #8FA0AE"><span language="selectedfile"></span></span>
                      </button>
                      <input
                              type="text"
                              name="fnsku_file" value="${item.fnsku_file}"
                              class="layui-input layui-hide"
                      />
                    </label>

                    <label class="layui-form-label" style="width: 10%; margin-left: 2%;">
                      <select name="is_xb" value="${item.is_xb}">
                          <option value="1">是</option>
                          <option value="2">否</option>
                        </select>
                    </label>
                    <label class="layui-form-label juxing"><span language="shangchuan"></span></label>
                    <label class="layui-form-label" style="width: 7%;">
                      <button type="button" class="layui-input fnsku_btn_xb"  style="border-radius: 0px 8px 8px 0px!important;cursor: pointer;">
                        <span style="margin-left: -40px!important;color: #8FA0AE"><span language="selectedfile"></span></span>
                      </button>
                      <input
                              type="text"
                              name="fnsku_file_xb"
                              value="${item.fnsku_file_xb}"
                              class="layui-input layui-hide"
                      />
                    </label>
                  </div>
                </div>
              `);
              $('.box .box-item select[name=is_hb]').eq(idx).val(item.is_hb);
              $('.box .box-item select[name=is_xb]').eq(idx).val(item.is_xb);
            });
          }
          if (type == 'edit') {
            for (var i = 0; i < $('.box .fnsku_btn').length; i++) {
              uploadFile($('.box .fnsku_btn')[i], null, null, function(
                      res,
                      index,
                      upload,
                      _this
              ) {
                if (res.code == 1) {
                  $(_this)[0]
                          .elem.parent()
                          .find('input[name=fnsku_file]')
                          .val(res.data.file_url);
                }
              });
            }
            for (var i = 0; i < $('.box .fnsku_btn_xb').length; i++) {
              uploadFile($('.box .fnsku_btn_xb')[i], null, null, function(
                      res,
                      index,
                      upload,
                      _this
              ) {
                if (res.code == 1) {
                  $(_this)[0]
                          .elem.parent()
                          .find('input[name=fnsku_file_xb]')
                          .val(res.data.file_url);
                }
              });
            }
          }
          if (type == 'detail') {
            $('button').hide();
            $('input,select,textarea').attr('disabled', true);
            $('.cz').hide();
            $('.layui-btn-normal').hide();
          }
          if (type == 'edit'){
            $('input[name=model]').attr('disabled', true);
            $('input[name=sku]').attr('disabled', true);
            $('input[name=box_num]').attr('disabled', true);
            $('input[name=sku_num]').attr('disabled', true);
            $('input[name=tracking_no]').attr('disabled', true);
          }
          $('#addBoxBtn').hide();

          setTimeout(()=>{
            setLanguage();
          }, 100)

          setLang();

          var lang = getCookie('lang');

          if (lang === 'en'){
            $("input[name='fahuo_remark']").attr('placeholder',"Please enter shipping remarks");
            $("input[name='sku']").attr('placeholder','please enter sku');
            $("input[name='model'],input[name='desc']").attr('placeholder','optional');
            $("input[name='sku_num']").attr('placeholder','Please enter in each box (number)');
            $("input[name='box_num']").attr('placeholder','Please enter the quantity (number of boxes)');
            $("input[name='tracking_no']").attr('placeholder','Please enter tracking number');
          }else{
            $("input[name='fahuo_remark']").attr('placeholder','请输入发货备注');
            $("input[name='sku']").attr('placeholder','请输入sku');
            $("input[name='model'],input[name='desc']").attr('placeholder','选填');
            $("input[name='sku_num']").attr('placeholder','请输入每箱内(个数)');
            $("input[name='box_num']").attr('placeholder','请输入数量(箱数)');
            $("input[name='tracking_no']").attr('placeholder','请输入跟踪号');
          }

          form.render();
        });
      }
    }
  });
  /* 包裹删除 */
  function removeBox() {
    if ($('.box .box-item').length <= 1) {
      return;
    }
    _this = event.target;
    $(_this)
            .parent()
            .parent()
            .parent()
            .parent()
            .remove();
  }
</script>
